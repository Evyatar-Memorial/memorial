<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>הנצחה לעילוי נשמת אביתר כהן ז"ל</title>
    <meta name="description" content="הצטרפו לכתיבת ספר תורה לעילוי נשמת אביתר כהן ז"ל וחבריו הגיבורים">
    
    <meta property="og:type" content="website">
    <meta property="og:title" content="לעילוי נשמת אביתר כהן וחבריו הגיבורים לגדוד יהונתן הי״ד ">
    <meta property="og:description" content="משתתפים בזכות!">
    <meta property="og:image" content="evyatar-pic.jpg">
    <meta property="og:url" content="https://evyatar-sefer-tora.tiiny.site/">

    <link rel="icon" type="image/jpeg" href="evyatar-pic.jpg">

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            text-align: center;
            max-width: 450px;
            width: 100%;
            overflow: hidden;
        }
        .header-image {
            width: 100%;
            height: auto;
            max-height: 450px;
            object-fit: contain;
            display: block;
            background-color: #fff;
        }
        .content {
            padding: 2rem;
        }
        h1 { color: #2c3e50; font-size: 1.6rem; margin: 10px 0; }
        .target-text { font-size: 1.1rem; margin-bottom: 1.5rem; color: #555; }
        
        .progress-container {
            background-color: #eee;
            border-radius: 20px;
            margin: 20px 0 10px 0;
            height: 32px;
            width: 100%;
            overflow: hidden;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
        }
        .progress-bar {
            background: linear-gradient(90deg, #27ae60, #2ecc71);
            height: 100%;
            width: 0%; 
            transition: width 2s cubic-bezier(0.1, 0, 0.1, 1);
            border-radius: 20px;
        }
        .stats {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            font-size: 1rem;
            color: #333;
        }
        .percentage-display {
            font-size: 1.4rem;
            font-weight: 800;
            color: #27ae60;
            margin: 15px 0;
        }
        .btn {
            background-color: #2196F3;
            color: white;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 30px;
            display: inline-block;
            font-weight: bold;
            font-size: 1.1rem;
            transition: transform 0.2s, background 0.3s;
            box-shadow: 0 4px 15px rgba(33, 150, 243, 0.3);
            margin-top: 10px;
        }
        .btn:hover { 
            background-color: #1976D2;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

<div class="card">
    <img src="evyatar-pic.jpg" alt="כרזת הנצחה" class="header-image">
    
    <div class="content">
        <h1>הכנסת ספר תורה</h1>
        <p class="target-text">לעילוי נשמת אביתר כהן וחבריו הגיבורים לגדוד יהונתן הי״ד </p>
        
        <div class="stats">
            <span>גוייס: <span id="raised-amount">0</span> ₪</span>
            <span>יעד: <span id="target-amount">0</span> ₪</span>
        </div>

        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        
        <div class="percentage-display" id="percentage-text">0% מהיעד הושג</div>

        <a href="https://www.jgive.com/new/he/ils/collect/donation-targets/167748/amount" target="_blank" class="btn">לתרומה והשתתפות במצווה</a>
    </div>
</div>

<script>
    // עדכון סכומים לפי הנתונים האחרונים
    const raised = 56000;  
    const target = 250000; 

    const percentage = Math.min((raised / target) * 100, 100).toFixed(1);

    document.getElementById('raised-amount').innerText = raised.toLocaleString();
    document.getElementById('target-amount').innerText = target.toLocaleString();
    
    setTimeout(() => {
        document.getElementById('progress-bar').style.width = percentage + '%';
        document.getElementById('percentage-text').innerText = percentage + '% מהיעד הושג';
    }, 500);
</script>

</body>
</html>
