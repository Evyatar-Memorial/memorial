<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הנצחה לעילוי נשמת אביתר כהן ז"ל</title>
    
    <meta property="og:title" content="הנצחה לעילוי נשמת אביתר כהן וחבריו הי״ד">
    <meta property="og:image" content="evyatar-pic1.jpg">
    <link rel="icon" type="image/jpeg" href="evyatar-pic1.jpg">

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #f0f2f5;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 20px;
        }
        .card {
            background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center; max-width: 450px; width: 100%; overflow: hidden;
        }
        .header-image { width: 100%; height: auto; display: block; }
        .content { padding: 2rem; }
        h1 { color: #2c3e50; font-size: 1.5rem; margin: 5px 0; }
        .sub-text { font-size: 1.1rem; color: #555; margin-bottom: 30px; }
        
        .amount-container {
            margin: 20px 0;
            padding: 20px;
            background-color: #f8f9fa;
            border-radius: 15px;
        }
        .label { font-size: 1.1rem; color: #7f8c8d; display: block; margin-bottom: 5px; }
        .total-amount { 
            font-size: 2.8rem; 
            font-weight: 800; 
            color: #2c3e50; 
            display: block;
        }
        
        .update-date { 
            font-size: 0.9rem; 
            color: #95a5a6; 
            margin-top: 20px;
            font-style: italic; 
        }
    </style>
</head>
<body>

<div class="card">
    <img src="evyatar-pic1.jpg" alt="הנצחה" class="header-image">
    <div class="content">
        <h1>הכנסת ספר תורה</h1>
        <p class="sub-text">לעילוי נשמת אביתר כהן וחבריו הגיבורים הי״ד</p>
        
        <div class="amount-container">
            <span class="label">סך התרומות שנאספו עד כה:</span>
            <span class="total-amount" id="raised">0</span>
        </div>
        
        <div class="update-date" id="date">מעדכן תאריך...</div>
    </div>
</div>

<script>
    // --- עדכן כאן את הסכום הכולל שנאסף ---
    const totalRaised = 114000; 
    // --------------------------------------

    document.getElementById('raised').innerText = totalRaised.toLocaleString() + ' ₪';

    // משיכת תאריך עדכון מה-Commit בגיטהאב
    async function updateDate() {
        try {
            const res = await fetch('https://api.github.com/repos/eranshak/memorial/commits?path=index.html&per_page=1');
            const data = await res.json();
            if (data && data.length > 0) {
                const date = new Date(data[0].commit.committer.date).toLocaleString('he-IL', {
                    day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit', timeZone:'Asia/Jerusalem'
                });
                document.getElementById('date').innerText = `עודכן לאחרונה: ${date}`;
            } else {
                document.getElementById('date').innerText = "עודכן לאחרונה: היום";
            }
        } catch(e) {
            document.getElementById('date').innerText = "עודכן לאחרונה: היום";
        }
    }
    updateDate();
</script>

</body>
</html>
